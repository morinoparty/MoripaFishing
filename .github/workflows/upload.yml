name: upload_release

on:
  release:
    types: [ published ]

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write
  actions: read

jobs:
  # ビルド・Maven Central 公開・アーティファクト準備
  build:
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_ACTOR: ${{ secrets.GITHUB_ACTOR }}
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      plugin_version: ${{ steps.version.outputs.plugin_version }}
      attestation_url: ${{ steps.attest.outputs.attestation-url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '25'

      # Gradle キャッシュの設定（setup-gradle を使用）
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # gradle/actions の Enhanced Caching (extra cache) を利用する。
          # https://github.com/gradle/actions/blob/main/DISTRIBUTION.md
          cache-provider: enhanced

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Set version env
        id: version
        run: |
          before="${{ github.event.release.tag_name }}"
          after="${before//v/}"
          echo "PLUGIN_VERSION=$after" >> $GITHUB_ENV
          echo "plugin_version=$after" >> $GITHUB_OUTPUT

      - name: change plugin.yml version
        run: |
          echo "バージョンは ${{ env.PLUGIN_VERSION }} なのだ！"
          sed -i "s/VersionPlaceholder/${{ env.PLUGIN_VERSION }}/" ./gradle.properties

      - name: Build with Gradle (parallel)
        run: ./gradlew build -x test --parallel

      - name: Publish API to Maven Central
        run: ./gradlew :api:publishAndReleaseToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_PUBLISH_MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PUBLISH_MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_PUBLISH_GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.MAVEN_PUBLISH_GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_PUBLISH_GPG_PASSPHRASE }}

      - name: Rename Bukkit JAR
        run:
          mv ./bukkit/build/libs/bukkit-*-all.jar ./bukkit/build/libs/MoripaFishing_${{ env.PLUGIN_VERSION }}.jar

      - name: Collect integration JARs
        run: ./.github/scripts/collect-module-jars.sh ./integrations ./release-integrations "${{ env.PLUGIN_VERSION }}"

      - name: Collect Addon JARs
        run: ./.github/scripts/collect-module-jars.sh ./addons ./release-addons "${{ env.PLUGIN_VERSION }}"

      # GitHub Attestations（Linked Artifacts 用）: 全 JAR をまとめて1つの attestation に署名する
      - name: Attest JAR artifacts
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            ./bukkit/build/libs/MoripaFishing_${{ env.PLUGIN_VERSION }}.jar
            ./api/build/libs/api-${{ env.PLUGIN_VERSION }}.jar
            ./release-integrations/*.jar
            ./release-addons/*.jar

      # SLSA 3 用: アーティファクトのハッシュを生成
      - name: Generate artifact hashes
        id: hash
        run: |
          BUKKIT_JAR="./bukkit/build/libs/MoripaFishing_${{ env.PLUGIN_VERSION }}.jar"
          API_JAR="./api/build/libs/api-${{ env.PLUGIN_VERSION }}.jar"
          echo "hashes=$(sha256sum "$BUKKIT_JAR" "$API_JAR" ./release-integrations/*.jar ./release-addons/*.jar | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Upload Bukkit JAR
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bukkit-jar
          path: ./bukkit/build/libs/MoripaFishing_${{ env.PLUGIN_VERSION }}.jar
          retention-days: 1

      - name: Upload API JAR
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: api-jar
          path: ./api/build/libs/api-${{ env.PLUGIN_VERSION }}.jar
          retention-days: 1

      - name: Upload integration JARs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-jars
          path: ./release-integrations
          retention-days: 1

      - name: Upload Addon JARs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: addon-jars
          path: ./release-addons
          retention-days: 1

  # SLSA 3 provenance 生成（分離された reusable workflow）
  provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true

  # Modrinth・GitHub Release 公開 + Linked Artifacts 登録
  publish:
    needs: [build, provenance]
    runs-on: ubuntu-latest
    env:
      PLUGIN_VERSION: ${{ needs.build.outputs.plugin_version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download Bukkit JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bukkit-jar
          path: ./artifacts

      - name: Download API JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: api-jar
          path: ./artifacts

      - name: Download integration JARs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: integration-jars
          path: ./artifacts/integrations

      - name: Download Addon JARs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: addon-jars
          path: ./artifacts/addons

      # Linked Artifacts: Maven Central の Storage Record を作成
      - name: Register Maven Central artifact to Linked Artifacts
        run: |
          API_JAR="./artifacts/api-${{ env.PLUGIN_VERSION }}.jar"
          DIGEST="sha256:$(sha256sum "$API_JAR" | awk '{print $1}')"
          MAVEN_PATH="party/morino/moripafishing-api/${{ env.PLUGIN_VERSION }}/moripafishing-api-${{ env.PLUGIN_VERSION }}.jar"

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /orgs/${{ github.repository_owner }}/artifacts/metadata/storage-record \
            -f name="party.morino:moripafishing-api" \
            -f digest="$DIGEST" \
            -f registry_url="https://central.sonatype.com/" \
            -f version="${{ env.PLUGIN_VERSION }}" \
            -f artifact_url="https://central.sonatype.com/artifact/party.morino/moripafishing-api/${{ env.PLUGIN_VERSION }}" \
            -f path="$MAVEN_PATH" \
            -f repository="party.morino:moripafishing-api" \
            -f github_repository="${{ github.event.repository.name }}" \
            -f status="active"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: Kir-Antipov/mc-publish@995edadc13559a8b28d0b7e6571229f067ec7659 # v3.3.0
        with:
          modrinth-id: vOFF1aw9
          modrinth-featured: true
          modrinth-token: ${{ secrets.MODRINTH_NIKOMARU_TOKEN }}

          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-draft: false
          files: |
            ./artifacts/MoripaFishing_${{ env.PLUGIN_VERSION }}.jar
            ./artifacts/integrations/*.jar
            ./artifacts/addons/*.jar
          loaders: |
            paper
            purpur
          game-versions: |
            >=1.21.4
          game-version-filter: releases
          modrinth-dependencies: |
            Vault(required)
          java: |
            21

      # リリースノートに SLSA provenance の確認リンクを追記する
      - name: Append SLSA provenance link to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          ATTESTATION_URL: ${{ needs.build.outputs.attestation_url }}
        run: |
          gh release view "$TAG" --json body -q .body > notes.md
          cat << EOF >> notes.md

          ## 🔏 Provenance (SLSA)

          Verify with \`gh attestation verify <jar-file> --owner morinoparty\`, or check the attestation directly: [View attestation]($ATTESTATION_URL)
          EOF
          gh release edit "$TAG" --notes-file notes.md

  # Pelican Panel 経由で本番サーバーのプラグインを更新し、再起動する
  deploy:
    needs: [build, publish]
    runs-on: ubuntu-latest
    env:
      PLUGIN_VERSION: ${{ needs.build.outputs.plugin_version }}
      PANEL_URL: ${{ secrets.PELICAN_PANEL_URL }}
      SERVER_UUID: ${{ secrets.PELICAN_SERVER_UUID }}
      API_KEY: ${{ secrets.PELICAN_CLIENT_API_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download Bukkit JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bukkit-jar
          path: ./artifacts

      - name: Download Addon JARs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: addon-jars
          path: ./artifacts/addons

      - name: Download integration JARs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: integration-jars
          path: ./artifacts/integrations

      # 旧 jar の削除 → 新 jar のアップロード → サーバー再起動を行う
      - name: Deploy and restart
        run: ./.github/scripts/pelican-deploy.sh

      # Linked Artifacts: 各 jar のデプロイ先環境を deployment record として登録する
      - name: Record deployments to Linked Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENVIRONMENT_NAME: Development Server
        run: ./.github/scripts/record-deployment.sh

name: preview.yml
on:
  pull_request:
    types: [opened, synchronize, closed]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write
  id-token: write
  attestations: write

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_EC2_METADATA_DISABLED: true
  AWS_REGION: auto
  AWS_CLI_FILE_ENCODING: UTF-8
  AWS_DEFAULT_S3_SIGNATURE_VERSION: s3v4
  S3_UPLOAD_BUCKET: ${{ secrets.S3_UPLOAD_BUCKET }}
  S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
  PREVIEW_BASE_URL: https://moripa-ci.nikomaru.dev/moripafishing
  PROJECT_NAME: MoripaFishing

jobs:
  # 共通の前処理：コミットSHAを取得
  setup:
    if: ${{ github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.vars.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set short git commit SHA
        id: vars
        run: |
          calculatedSha=$(git rev-parse --short HEAD)
          echo "commit_sha=$calculatedSha" >> $GITHUB_OUTPUT

  # Gradle ビルドジョブ（docs と並列実行）
  build-gradle:
    needs: setup
    runs-on: ubuntu-latest
    outputs:
      test_total: ${{ steps.publish-test-results.outputs.total }}
      test_passed: ${{ steps.publish-test-results.outputs.passed }}
      test_skipped: ${{ steps.publish-test-results.outputs.skipped }}
      test_failed: ${{ steps.publish-test-results.outputs.failed }}
      attestation_url: ${{ steps.attest.outputs.attestation-url }}
    env:
      COMMIT_SHORT_SHA: ${{ needs.setup.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '25'

      # Gradle キャッシュの設定（setup-gradle を使用）
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # gradle/actions の Enhanced Caching (extra cache) を利用する。
          # https://github.com/gradle/actions/blob/main/DISTRIBUTION.md
          cache-provider: enhanced
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: change plugin.yml version
        run: |
          sed -i "s/VersionPlaceholder/${{ env.COMMIT_SHORT_SHA }}/" ./gradle.properties

      - name: Build with Gradle
        continue-on-error: true
        run: ./gradlew build

      - name: Install Allure CLI
        if: success() || failure()
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.32.2/allure-2.32.2.tgz | tar -xz
          echo "$PWD/allure-2.32.2/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        if: success() || failure()
        continue-on-error: true
        run: allure generate ./bukkit/build/allure-results -o ./bukkit/build/allure-report --clean

      - name: Publish test results
        id: publish-test-results
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        if: success() || failure()
        with:
          report_paths: './**/build/test-results/test/TEST-*.xml'

      - name: Prepare Gradle artifacts
        env:
          SHA: ${{ env.COMMIT_SHORT_SHA }}
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
        run: |
          mkdir -p ./gradle-artifacts/jars
          mkdir -p ./gradle-artifacts/junit
          mkdir -p ./gradle-artifacts/detekt
          mkdir -p ./gradle-artifacts/allure
          mv ./bukkit/build/libs/bukkit-*-all.jar "./gradle-artifacts/jars/${PROJECT_NAME}-bukkit-${SHA}.jar"
          mv ./api/build/libs/api-${SHA}.jar "./gradle-artifacts/jars/${PROJECT_NAME}-api-${SHA}.jar"
          # 統合/アドオンモジュールの jar は自動収集する。新しい integration/addon を追加しても
          # ここを編集せずにアーティファクト・コメント表へ自動的に増える。-api の SPI 専用モジュールは
          # 配布物ではないため除外する。
          for dir in ./integrations/*/ ./addons/*/; do
            [ -d "$dir" ] || continue
            base="$(basename "$dir")"
            case "$base" in
              *-api) continue ;;
            esac
            for jar in "$dir"build/libs/*-${SHA}.jar; do
              [ -e "$jar" ] || continue
              mv "$jar" "./gradle-artifacts/jars/${PROJECT_NAME}-$(basename "$jar")"
            done
          done
          # PR コメントの表を動的生成するために jar 一覧を残す
          ls -1 ./gradle-artifacts/jars > ./gradle-artifacts/jars.txt
          cp -r ./bukkit/build/reports/tests/test/* ./gradle-artifacts/junit/ || echo "No JUnit reports found"
          cp -r ./build/reports/detekt/* ./gradle-artifacts/detekt/ || echo "No Detekt reports found"
          cp -r ./bukkit/build/allure-report/* ./gradle-artifacts/allure/ || echo "No Allure reports found"

      # GitHub Attestations で署名
      - name: Attest JAR artifacts
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: './gradle-artifacts/jars/*.jar'

      - name: Upload Gradle artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gradle-artifacts
          path: ./gradle-artifacts
          retention-days: 1

  # JitPack SNAPSHOT ビルドをトリガー
  trigger-jitpack:
    needs: [setup, build-gradle]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger JitPack builds
        run: |
          BRANCH="${{ github.head_ref }}"
          COMMIT="${{ github.event.pull_request.head.sha }}"
          echo "Triggering JitPack builds for branch: $BRANCH, commit: $COMMIT"
          curl -s "https://jitpack.io/api/builds/com.github.morinoparty/MoripaFishing/${BRANCH}-SNAPSHOT" || true
          curl -s "https://jitpack.io/api/builds/com.github.morinoparty/MoripaFishing/${COMMIT}" || true
          echo "JitPack builds triggered"

  # Docs ビルドジョブ（gradle と並列実行）
  build-docs:
    needs: setup
    runs-on: ubuntu-latest
    env:
      COMMIT_SHORT_SHA: ${{ needs.setup.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '25'

      # Gradle キャッシュの設定（Dokka 生成用）
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          # gradle/actions の Enhanced Caching (extra cache) を利用する。
          # https://github.com/gradle/actions/blob/main/DISTRIBUTION.md
          cache-provider: enhanced
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        name: Install pnpm
        with:
          version: 10
          run_install: false

      # pnpm キャッシュの設定
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Install docs dependencies
        working-directory: docs
        run: pnpm install

      - name: Generate Dokka API documentation
        run: ./gradlew dokkaGenerate

      - name: Build Fumadocs
        working-directory: docs
        env:
          BASE_PATH: /moripafishing/${{ env.COMMIT_SHORT_SHA }}/docs
        run: pnpm run build

      - name: Upload docs artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs-artifacts
          path: ./docs/out
          retention-days: 1

  # S3 アップロードジョブ（JARs, Docs, レポート）
  upload-s3:
    needs: [setup, build-gradle, build-docs]
    runs-on: ubuntu-latest
    env:
      COMMIT_SHORT_SHA: ${{ needs.setup.outputs.commit_sha }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./artifacts

      - name: Prepare upload directory
        run: |
          mkdir -p ./upload
          cp -r ./artifacts/gradle-artifacts/jars ./upload/ || echo "No JARs"
          cp -r ./artifacts/gradle-artifacts/junit ./upload/ || echo "No JUnit reports"
          cp -r ./artifacts/gradle-artifacts/detekt ./upload/ || echo "No Detekt reports"
          cp -r ./artifacts/gradle-artifacts/allure ./upload/ || echo "No Allure reports"
          mkdir -p ./upload/docs
          mv ./artifacts/docs-artifacts/* ./upload/docs/

      - name: Upload to S3 (parallel)
        run: |
          # AWS CLIの並列リクエスト数を増やす
          aws configure set default.s3.max_concurrent_requests 50

          S3_BASE="s3://${{ env.S3_UPLOAD_BUCKET }}/moripafishing/${{ env.COMMIT_SHORT_SHA }}"
          S3_OPTS="--endpoint-url ${S3_ENDPOINT} --only-show-errors"

          # JARs, Docs, レポートを並列でアップロード
          [ -d ./upload/jars ] && aws s3 cp ./upload/jars $S3_BASE/jars $S3_OPTS --recursive &
          aws s3 cp ./upload/junit $S3_BASE/junit $S3_OPTS --recursive &
          aws s3 cp ./upload/detekt $S3_BASE/detekt $S3_OPTS --recursive &
          aws s3 cp ./upload/allure $S3_BASE/allure $S3_OPTS --recursive &
          aws s3 cp ./upload/docs $S3_BASE/docs $S3_OPTS --recursive &

          # 全ての並列アップロードを待機
          wait
          echo "S3 upload completed"

  # コメント作成ジョブ
  comment:
    needs: [setup, build-gradle, upload-s3]
    runs-on: ubuntu-latest
    if: ${{ github.event.action == 'opened' || github.event.action == 'synchronize' }}
    env:
      COMMIT_SHORT_SHA: ${{ needs.setup.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Get limit time
        id: limit-time
        run: |
          limit_time=$(date -d "7 days" +%Y-%m-%d)
          echo "LIMIT_TIME=$limit_time" >> $GITHUB_ENV

      # jar 一覧 (jars.txt) を取得して表を動的生成するため、ビルド成果物を取り込む
      - name: Download Gradle artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: gradle-artifacts
          path: ./gradle-artifacts

      - name: Build JAR table rows
        id: jar-rows
        env:
          S3_DOWNLOAD_BASE: "${{ env.PREVIEW_BASE_URL }}/${{ env.COMMIT_SHORT_SHA }}/jars"
          SHA: ${{ env.COMMIT_SHORT_SHA }}
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
        run: |
          {
            echo "rows<<ROWS_EOF"
            while read -r f; do
              [ -n "$f" ] || continue
              label="${f#${PROJECT_NAME}-}"
              label="${label%-${SHA}.jar}"
              echo "| ${label} | [${f}](${S3_DOWNLOAD_BASE}/${f}) |"
            done < ./gradle-artifacts/jars.txt
            echo "ROWS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create comment file
        env:
          JUNIT_REPORT_URL: "${{ env.PREVIEW_BASE_URL }}/${{ env.COMMIT_SHORT_SHA }}/junit/index.html"
          ALLURE_REPORT_URL: "${{ env.PREVIEW_BASE_URL }}/${{ env.COMMIT_SHORT_SHA }}/allure/index.html"
          DETEKT_REPORT_URL: "${{ env.PREVIEW_BASE_URL }}/${{ env.COMMIT_SHORT_SHA }}/detekt/detekt.html"
          DOCS_PREVIEW_URL: "${{ env.PREVIEW_BASE_URL }}/${{ env.COMMIT_SHORT_SHA }}/docs/index.html"
          DOKKA_URL: "${{ env.PREVIEW_BASE_URL }}/${{ env.COMMIT_SHORT_SHA }}/docs/dokka/index.html"
          ATTESTATION_URL: "${{ needs.build-gradle.outputs.attestation_url }}"
          LIMIT_TIME: ${{ env.LIMIT_TIME }}
          JAR_ROWS: ${{ steps.jar-rows.outputs.rows }}
        run: |
          cat << EOF > comment.md
          ## 🚀 Preview of ${{ github.event.repository.name }}

          ### 📦 Preview JARs
          Available for 7 days (until $LIMIT_TIME)
          | Artifact | Download |
          |----------|----------|
          $JAR_ROWS

          > 📜 **Attestation** (SLSA provenance): [Verify on GitHub]($ATTESTATION_URL) or run \`gh attestation verify <jar-file> --owner morinoparty\`

          ### 📖 Documentation & Reports
          | Resource | Link |
          |----------|------|
          | 📖 Documentation | [Preview]($DOCS_PREVIEW_URL) |
          | 📖 Dokka API | [Preview]($DOKKA_URL) |
          | 🧪 Allure Report | [Report]($ALLURE_REPORT_URL) |
          | 🧪 JUnit Report | [Report]($JUNIT_REPORT_URL) |
          | 🔍 Detekt Report | [Report]($DETEKT_REPORT_URL) |

          ### 🧪 Test Summary
          | Tests | Passed | Skipped | Failed |
          |-------|--------|---------|--------|
          | ${{ needs.build-gradle.outputs.test_total }} | ${{ needs.build-gradle.outputs.test_passed }} ✅ | ${{ needs.build-gradle.outputs.test_skipped }} ⏭️ | ${{ needs.build-gradle.outputs.test_failed }} ❌ |
          EOF

      - name: Create PR comment
        run: gh pr comment ${{ github.event.number }} --body-file comment.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
